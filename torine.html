<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
  <title>とりね洞</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --paper: rgba(255,255,255,0.52);
      --ink: #1e1c1a;
      --sub: rgba(30,28,26,0.34);
      --line: rgba(30,28,26,0.06);
      --shadow: 0 20px 40px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

html {
  overflow-x: hidden;
}

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Zen Maru Gothic", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.72), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.5), transparent 28%),
        linear-gradient(180deg, #f7f5f0 0%, #efebe3 100%);
      color: var(--ink);
      overflow-x: hidden;
      position: relative;
      padding: 0;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 32px 20px 120px;
    }
    
   

    .title {
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0.12em;
      margin: 0;
      font-weight: 700;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(30,28,26,0.42);
    }

.layer {
  position: relative;
  height: 900px;        /* 洞の深さ */
  min-height: 900px;
  padding-top: 28px;    /* ロゴ下の余白 */
  margin-top: 0;
  overflow: visible;   /* 下に続ける */
}

    .marker {
      margin: 110px 0 70px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(30,28,26,0.24);
      user-select: none;
    }

    .torine {
      position: absolute;
      max-width: 42vw;
      min-width: 90px;
      padding: 6px 10px;
      font-size: clamp(16px, 2vw, 28px);
      line-height: 1.7;
      font-family: "Zen Maru Gothic", "Hiragino Sans", sans-serif;
      color: rgba(15,14,12,0.88);
      background: transparent;
      border: none;
      box-shadow: none;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      opacity: 0;
      filter: blur(4px);
      transition: opacity 0.8s ease, filter 0.8s ease, transform 0.4s ease;
      animation: float var(--dur, 12s) ease-in-out infinite;
    }

    .torine.visible {
      opacity: 1;
      filter: blur(0);
    }

    .torine:hover {
      filter: blur(0) drop-shadow(0 8px 16px rgba(0,0,0,0.06));
    }

    .torine::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 2px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(30,28,26,0.1), transparent);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .torine:hover::after {
      opacity: 1;
    }

    .torine.small {
      font-size: clamp(14px, 1.4vw, 18px);
    }

    .torine.large {
      font-size: clamp(22px, 2.5vw, 34px);
    }

    .torine.faint {
      color: rgba(15,14,12,0.45);
    }

    .torine.deep {
      color: rgba(15,14,12,0.96);
      font-weight: 700;
    }

    .floating-dust::before,
    .floating-dust::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(0,0,0,0.04) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 30%, rgba(0,0,0,0.035) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 70%, rgba(0,0,0,0.03) 0 1px, transparent 2px),
        radial-gradient(circle at 60% 85%, rgba(0,0,0,0.03) 0 1px, transparent 2px);
      animation: drift 22s linear infinite;
      opacity: 0.65;
    }

    .floating-dust::after {
      animation-duration: 34s;
      opacity: 0.42;
      transform: scale(1.2);
    }

    .scroll-top-btn {
  position: fixed;
  right: 18px;
  bottom: 24px;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  transition: all 0.25s ease;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255, 245, 200, 0.14);
  color: #dbc06a;

  text-shadow:
    0 0 4px rgba(255, 230, 140, 0.6),
    0 0 10px rgba(255, 210, 120, 0.3);

  border: 1px solid rgba(30, 28, 26, 0.08);
  backdrop-filter: blur(8px);

  font-size: 18px;
  font-weight: 700;
  line-height: 1;

  opacity: 0.5;
  z-index: 30;

  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
}

.scroll-top-btn:hover {
  opacity: 1;
  transform: translateY(-2px);
}

.scroll-top-btn:active {
  transform: scale(0.92);
  opacity: 0.6;
}

    .sheet {
      position: fixed;
      inset: auto 18px 70px auto;
      z-index: 25;
      width: min(360px, calc(100vw - 36px));
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(30,28,26,0.08);
      border-radius: 24px;
      padding: 18px 18px 20px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.10);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: 0.35s ease;
    }

    .sheet.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .sheet-date {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--sub);
      margin-bottom: 12px;
    }

    .sheet-torine {
      font-size: 26px;
      line-height: 1.7;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .sheet-meta {
      font-size: 13px;
      line-height: 1.8;
      color: rgba(30,28,26,0.72);
      white-space: pre-wrap;
    }

    .sheet-log-link {
      display: inline-block;
      margin-top: 14px;
      font-size: 12px;
      color: rgba(30,28,26,0.55);
      text-decoration: none;
      border-bottom: 1px solid rgba(30,28,26,0.12);
    }

    .sheet-log-link:hover {
      opacity: 0.72;
    }

    .empty-note {
      text-align: center;
      margin-top: 120px;
      color: rgba(30,28,26,0.38);
      font-size: 15px;
      line-height: 1.9;
    }

.back-floating {
  position: fixed;
  right: 20px;
  font-size: 12px;
  color: rgba(0,0,0,0.35);
  text-decoration: none;
  z-index: 30;
  opacity: 0.7;
}

.back-floating:first-of-type {
  bottom: 92px;
}

.back-floating.logs {
  bottom: 68px;
    }
   .scroll-top-btn {
  bottom: 24px;
}


    @keyframes drift {
      from { transform: translateY(0px); }
      50% { transform: translateY(18px); }
      to { transform: translateY(0px); }
    }

    @keyframes float {
      0%   { transform: translate(0px, 0px) rotate(var(--rot, 0deg)); }
      25%  { transform: translate(var(--x1, 8px), var(--y1, -10px)) rotate(calc(var(--rot, 0deg) + 0.8deg)); }
      50%  { transform: translate(var(--x2, -6px), var(--y2, 6px)) rotate(calc(var(--rot, 0deg) - 0.6deg)); }
      75%  { transform: translate(var(--x3, 10px), var(--y3, 4px)) rotate(calc(var(--rot, 0deg) + 0.4deg)); }
      100% { transform: translate(0px, 0px) rotate(var(--rot, 0deg)); }
    }

    @media (max-width: 640px) {
      .wrap {
        padding-inline: 16px;
        padding-top: 0;
      }

      .topbar {
        margin-inline: -16px;
        padding-inline: 16px;
      }


      .torine {
        max-width: 78vw;
        white-space: normal;
      }

      .sheet-torine {
        font-size: 22px;
      }
    }
    

#torineSpirit {
  transition: opacity 0.8s ease, transform 0.8s ease;
}

/* 呼吸アニメ */
@keyframes torineBreath {
  0%   { transform: translateY(0px) scale(1); }
  50%  { transform: translateY(-4px) scale(1.02); }
  100% { transform: translateY(0px) scale(1); }
}

.torine-breath {
  animation: torineBreath 4s ease-in-out infinite;
}


.fade-in {
  opacity: 0;
  filter: blur(4px);
  transform: translateY(10px);
  transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
}

.fade-in.show {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}


.page-fade-out {
  position: fixed;
  inset: 0;
  background: rgba(20,20,22,0.6);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.4s ease;
}

.page-fade-out.show {
  opacity: 1;
}

.logo-img {
  display: block;
  margin: 0 auto 0px;
  width: 180px;
  max-width: 60%;
  opacity: 0.9;
}


.topbar {
  position: relative;
  z-index: 20;
  background: transparent;
  border: none;
  margin: 0;
  padding: 18px 0 4px;
  backdrop-filter: none;
}

.torine-logo-crop {
  width: 240px;
  height: 125px;
  overflow: hidden;
  margin: 0 auto;
  display: flex;
  justify-content: center;
  align-items: center;
}

.torine-logo-main {
  display: block;
  width: 240px;
  height: auto;
  opacity: 0.9;
}

.side-nav {
  position: fixed;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 999;
}


.side-nav a {
  writing-mode: vertical-rl;
  text-orientation: mixed;

  font-size: 11px;
  letter-spacing: 0.08em;

  color: rgba(219,192,106,0.75); /* 金寄り */
  text-decoration: none;

  padding: 6px 4px;
  border-radius: 10px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(4px);

  transition: all 0.2s ease;
}

.side-nav a:active {
  opacity: 0.6;
  transform: scale(0.95);
}
   .side-nav a.active {
  color: #dbc06a;
  opacity: 1;
  font-weight: 500;
}

.side-nav a {
  opacity: 0.5;
}

.side-nav a:hover {
  opacity: 0.9;
}

  </style>
  
</head>
<body class="floating-dust">

  <div id="pageFadeOut" class="page-fade-out"></div>

  <div class="wrap fade-in">
  
    <div class="topbar">
  <div class="torine-logo-crop">
    <img src="images/torine-logo-main.png" class="torine-logo-main">
  </div>
</div>

    <div id="layer" class="layer">
  <img id="torineSpirit" style="display:none; position:absolute;" />
</div>
  </div>

  <button class="scroll-top-btn" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">︿</button>

  <div id="sheet" class="sheet">
    <div id="sheetDate" class="sheet-date"></div>
    <div id="sheetTorine" class="sheet-torine"></div>
    <div id="sheetMeta" class="sheet-meta"></div>
  </div>

  <script>
    const rawLogs = JSON.parse(localStorage.getItem("airoLogs")) || [];

    const torineLogs = rawLogs
      .filter(log => log.torine && log.torine.trim() !== "")
      .map(log => ({
        torine: log.torine,
        date: log.date || "",
        exhibition: log.exhibition || "",
        memo: log.analysis || "",
        logId: log.id
      }));

    const layer = document.getElementById("layer");
    const sheet = document.getElementById("sheet");
    const sheetDate = document.getElementById("sheetDate");
    const sheetTorine = document.getElementById("sheetTorine");
    const sheetMeta = document.getElementById("sheetMeta");

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createMarkers(count, baseHeight) {
      if (count < 6) return;

      const markerCount = Math.min(3, Math.floor(count / 4));
      for (let i = 0; i < markerCount; i++) {
        const marker = document.createElement("div");
        marker.className = "marker";
        marker.textContent = "——";
        marker.style.position = "absolute";
        marker.style.top = `${baseHeight * (0.24 + i * 0.24)}px`;
        marker.style.left = "50%";
        marker.style.transform = "translateX(-50%)";
        layer.appendChild(marker);
      }
    }

    function renderTorine() {
  if (torineLogs.length === 0) {
    layer.innerHTML = `
      <div class="empty-note">
        まだ、とりねは眠っています。<br>
        あいろでことばを残すと、ここにただよいはじめます。
      </div>
    `;
    return;
  }

  const spiritEl = document.getElementById("torineSpirit");
layer.innerHTML = "";
if (spiritEl) layer.appendChild(spiritEl);

  
  const min = 4;
const max = 8;

let count = Math.floor(Math.random() * (max - min + 1)) + min;

// たまにだけ“増える日”
if (Math.random() > 0.85) {
  count += 2;
}



const items = shuffle(torineLogs).slice(0, Math.min(count, torineLogs.length));

  const layerWidth = Math.max(window.innerWidth, 980);
  const baseHeight = 1500;
layer.style.minHeight = baseHeight + "px";

  createMarkers(items.length, baseHeight);




items.forEach((item, index) => {
  const el = document.createElement("button");
  const sizeRoll = Math.random();

  el.className = "torine";
  if (sizeRoll > 0.8) el.classList.add("large");
  else if (sizeRoll < 0.3) el.classList.add("small");
  if (Math.random() > 0.65) el.classList.add("faint");
  if (Math.random() > 0.82) el.classList.add("deep");

  if (Math.random() > 0.85) {
    el.style.opacity = 0.7 + Math.random() * 0.25;
  } else {
    el.style.opacity = 0.2 + Math.random() * 0.3;
  }

  let left, top;

left = 24 + Math.random() * Math.max(40, window.innerWidth - 220);
top = 160 + Math.random() * Math.max(80, baseHeight - 260);

  const rot = (Math.random() * 4 - 2).toFixed(2) + "deg";
 
 let dur;

const roll = Math.random();

if (roll > 0.85) {
  // ほぼ止まってる
  dur = (24 + Math.random() * 12).toFixed(2) + "s";
} else if (roll > 0.6) {
  // ゆっくり
  dur = (16 + Math.random() * 8).toFixed(2) + "s";
} else {
  // 少しだけ動く
  dur = (10 + Math.random() * 6).toFixed(2) + "s";
}

  el.style.left = `${left}px`;
el.style.top = `${top}px`;
el.style.setProperty("--rot", rot);
el.style.setProperty("--dur", dur);

el.style.setProperty("--x1", `${(Math.random() * 32 - 16).toFixed(1)}px`);
el.style.setProperty("--y1", `${(Math.random() * 32 - 16).toFixed(1)}px`);
el.style.setProperty("--x2", `${(Math.random() * 36 - 18).toFixed(1)}px`);
el.style.setProperty("--y2", `${(Math.random() * 36 - 18).toFixed(1)}px`);
el.style.setProperty("--x3", `${(Math.random() * 28 - 14).toFixed(1)}px`);
el.style.setProperty("--y3", `${(Math.random() * 28 - 14).toFixed(1)}px`);

  el.textContent = item.torine;

  el.addEventListener("click", () => {
    sheet.classList.add("open");
    sheetDate.textContent = item.date ? `—— ${item.date}` : "——";
    sheetTorine.textContent = item.torine;

    sheetMeta.innerHTML = "";

    const metaText = document.createElement("div");
    metaText.textContent = `${item.exhibition || ""}\n${item.memo || ""}`;
    metaText.style.whiteSpace = "pre-wrap";
    sheetMeta.appendChild(metaText);

    if (item.logId) {
      const link = document.createElement("a");
      link.href = `logs.html?id=${item.logId}`;
      link.className = "sheet-log-link";
      link.textContent = "このログへ";
      sheetMeta.appendChild(link);
    }
  });

  layer.appendChild(el);
});　



  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll(".torine").forEach(el => observer.observe(el));
}

renderTorine();

    document.addEventListener("click", (e) => {
      if (!sheet.contains(e.target) && !e.target.classList.contains("torine")) {
        sheet.classList.remove("open");
      }
    });
    
    



// ① state
let torineCaveState = {
  totalScore: torineLogs.length,
  todayDate: new Date().toISOString().split('T')[0],
  appearedToday: false,
  activeSpirit: null
};


// ② 画像リスト
const imageList = [
  "spirit1",
  "spirit2",
  "spirit3",
  "spirit4",
  "spirit5",
  "spirit6"
];

// ③ ランダム関数
function pickRandomImage() {
  return imageList[Math.floor(Math.random() * imageList.length)];
}

// ④ spawn関数
function spawnTorineSpirit() {
  torineCaveState.activeSpirit = {
    imageId: pickRandomImage(),
    x: Math.random() * 60 + 20,
    y: Math.random() * 60 + 20,
    opacity: Math.random() * 0.13 + 0.72,
    createdAt: Date.now()
  };

  torineCaveState.appearedToday = true;

  renderTorineSpirit();
}




function renderTorineSpirit() {
  const spiritEl = document.getElementById("torineSpirit");

  if (!spiritEl) return;

  // いないとき
  if (!torineCaveState.activeSpirit) {
    spiritEl.style.display = "none";
    spiritEl.classList.remove("torine-breath");
    return;
  }

  const spirit = torineCaveState.activeSpirit;

  // 基本設定
  spiritEl.src = "images/" + spirit.imageId + ".png";
  spiritEl.style.display = "block";
  spiritEl.style.position = "absolute";
  spiritEl.style.left = spirit.x + "%";
  spiritEl.style.top = spirit.y + "%";
  spiritEl.style.pointerEvents = "none";
  

　// アニメ初期化
spiritEl.classList.remove("torine-breath");
spiritEl.style.opacity = 0;
spiritEl.style.transform = "scale(1)";
spiritEl.style.width = "180px";


  // フェードイン + 拡大
  setTimeout(() => {
    spiritEl.style.opacity = spirit.opacity;
    spiritEl.style.transform = "scale(1)";
  }, 120);

  // 呼吸アニメ開始
  setTimeout(() => {
    spiritEl.classList.add("torine-breath");
  }, 900);
}


  function checkTorineDate() {
  const today = new Date().toISOString().split('T')[0];

  if (torineCaveState.todayDate !== today) {
    torineCaveState.todayDate = today;
    torineCaveState.appearedToday = false;
    torineCaveState.activeSpirit = null;
    renderTorineSpirit();
  }
}

function addTorine(score = 1) {
  checkTorineDate();

  torineCaveState.totalScore += score;

  if (torineCaveState.totalScore >= 10 && !torineCaveState.appearedToday) {
    spawnTorineSpirit();
  }
}

checkTorineDate();

if (torineCaveState.totalScore >= 10 && !torineCaveState.appearedToday) {
  spawnTorineSpirit();
} else {
  renderTorineSpirit();
}


document.addEventListener("DOMContentLoaded", () => {
  const root = document.querySelector(".fade-in");
  if (!root) return;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      root.classList.add("show");
    });
  });
});

    
  </script>

</div>
