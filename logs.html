</head>
<body>
<div id="pageFadeOut" class="page-fade-out"></div>
  <div class="container">
  <div class="logo-wrap">
  <img src="logo-log.png" class="logo-img" alt="あいろ">
</div>

    <div class="card">
      
<div class="subnav-row-left">
  <button type="button" class="subnav-link" onclick="location.href='index.html'">
    入力ページにもどる
  </button>
  <button class="torine-link" onclick="goTorine()">
  とりね洞へ潜る
</button>
  
</div>

      <div class="top-tools">
        <select id="sortOrder" onchange="renderLogs()">
          <option value="new">新しい順</option>
          <option value="old">古い順</option>
        </select>

       <select id="filterTag" onchange="renderLogs()">
    <option value="all">すべてのタグ</option>
    <option value="美術">美術</option>
    <option value="書道">書道</option>
    <option value="写真">写真</option>
    <option value="舞台">舞台</option>
    <option value="音楽">音楽</option>
    <option value="映画">映画</option>
    <option value="本">本</option>
    <option value="建築">建築</option>
    <option value="工芸">工芸</option>
    <option value="人">人</option>
    <option value="日常">日常</option>
    <option value="その他">その他</option>

        </select>
      </div>

<div id="emptyMessage" class="empty-message hidden">
  とりね待ちの記憶たち
</div>


      <div id="logList"></div>
    </div>

    <div class="card hidden" id="detailCard">
      <h2 class="section-title">ふりかえり</h2>
      <div id="detailView" class="detail"></div>
      <div class="button-row detail-actions">
  <button onclick="startEditFromLogs()">編集</button>
  <button type="button" class="secondary" onclick="deleteLog()">削除</button>
</div>

<button type="button" class="secondary detail-close" onclick="closeDetail()">
  閉じる
</button>
      </div>
</div>

  <script>
    let logs = JSON.parse(localStorage.getItem("airoLogs")) || [];

logs = logs.map(log => ({
  ...log,
  tags: log.tags || (log.tag ? [log.tag] : [])
}));
    let selectedId = null;
let editingId = null;

    function getFilteredSortedLogs() {
  const sortOrder = document.getElementById("sortOrder").value;
  const filterTag = document.getElementById("filterTag").value;

  let result = [...logs];

  if (filterTag && filterTag !== "all") {
    result = result.filter(log => {
      const tags = log.tags || (log.tag ? [log.tag] : []);
      return tags.includes(filterTag);
    });
  }

  result.sort((a, b) => {
    return sortOrder === "new" ? b.id - a.id : a.id - b.id;
  });

  return result;
}
      

function renderLogs() {
  const logList = document.getElementById("logList");
  const emptyMessage = document.getElementById("emptyMessage");
  const filteredLogs = getFilteredSortedLogs();

  logList.innerHTML = "";

  if (filteredLogs.length === 0) {
    emptyMessage.classList.remove("hidden");
    return;
  } else {
    emptyMessage.classList.add("hidden");
  }

  filteredLogs.forEach(log => {
    const div = document.createElement("div");
    div.className = "log-item";
    div.onclick = function() {
      showDetail(log.id);
    };

    const torineMain = document.createElement("div");
    torineMain.className = "log-torine-main";

    if (!log.torine || log.torine.trim() === "") {
  torineMain.textContent = "とりね中…";
  torineMain.classList.add("empty");
} else {
  torineMain.textContent = log.torine;
}

    const subtitle = document.createElement("div");
    subtitle.className = "log-subtitle";
    const tagHtml = renderTagSpans(log.tags || (log.tag ? [log.tag] : []));

subtitle.innerHTML =
  "<span>" + escapeHtml(log.exhibition || "") + "</span>" +
  (log.date ? "<br><span>" + escapeHtml(log.date) + "</span>" : "") +
  (tagHtml ? "<div class='tag-wrap'>" + tagHtml + "</div>" : "");

    div.appendChild(torineMain);
    div.appendChild(subtitle);

    logList.appendChild(div);
  });
}

    function showDetail(id) {
      const log = logs.find(item => item.id === id);
      if (!log) return;

      selectedId = id;

      const detailCard = document.getElementById("detailCard");
      const detailView = document.getElementById("detailView");

　const tagHtml = renderTagSpans(log.tags || (log.tag ? [log.tag] : []));

      detailView.innerHTML =
        (tagHtml ? "<div class='tag-wrap'>" + tagHtml + "</div>" : "") +
        ((log.torine && log.torine.trim() !== "")
          ? "<div class='torine-hero'>" +
              "<div class='torine-hero-label'>とりね</div>" +
              "<div class='torine-hero-text'>" + escapeHtml(log.torine) + "</div>" +
            "</div>"
          : "<div class='torine-hero'>" +
              "<div class='torine-hero-label'>とりね</div>" +
              "<div class='torine-hero-text'>とりね中…</div>" +
            "</div>"
        ) +
        makeDetailBlock("日付", log.date || "") +
        makeDetailBlock("展覧会名", log.exhibition || "") +
        makeDetailBlock("場所", log.place || log.artist || "") +
(log.photo ? "<div class='detail-block'><div class='detail-label'>画像</div><img src='" + log.photo + "' class='photo-preview' alt='保存画像'></div>" : "") +
makeDetailBlock("雰囲気", log.atmosphere || log.air || "") +
makeDetailBlock("感じたこと", log.felt || "") +
makeDetailBlock(
  "印象に残ったところ",
  log.points && log.points.length ? log.points.join("\n") : ""
) +
makeDetailBlock("しくみ", log.analysis || "");
      detailCard.classList.remove("hidden");
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function closeDetail() {
      document.getElementById("detailCard").classList.add("hidden");
    }
    
    function deleteLog() {
  if (!selectedId) return;

  const ok = confirm("この記録を削除する？");
  if (!ok) return;

  logs = logs.filter(log => log.id !== selectedId);
  localStorage.setItem("airoLogs", JSON.stringify(logs));

  selectedId = null;
  closeDetail();
  renderLogs();
}


  function openLogFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const targetId = params.get("id");
    if (!targetId) return;

    const numericId = Number(targetId);
    if (!numericId) return;

    const targetLog = logs.find(log => log.id === numericId);
    if (!targetLog) return;

    showDetail(numericId);

    setTimeout(() => {
      const detailCard = document.getElementById("detailCard");
      if (detailCard) {
        detailCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }, 100);
  }

  renderLogs();
  openLogFromQuery();

function startEditFromLogs() {
  if (!selectedId) return;

  localStorage.setItem("airoEditingId", String(selectedId));
  location.href = "index.html";
}

function renderTagSpans(tags) {
  const list = tags || [];
  return list.map(tag =>
    "<span class='tag " + getTagClass(tag) + "'>" + escapeHtml(tag) + "</span>"
  ).join("");
}

    function getTagClass(tag) {
  switch(tag) {
    case "美術": return "tag-art";
    case "書道": return "tag-calligraphy";
    case "写真": return "tag-photo";
    case "舞台": return "tag-stage";
    case "音楽": return "tag-music";
    case "映画": return "tag-movie";
    case "本": return "tag-book";
    case "建築": return "tag-architecture";
    case "工芸": return "tag-craft";
    case "人": return "tag-person";
    case "日常": return "tag-daily";
    default: return "tag-other";
  }
}

    function makeDetailBlock(label, value) {
      return (
        "<div class='detail-block'>" +
          "<div class='detail-label'>" + escapeHtml(label) + "</div>" +
          "<div>" + escapeHtml(value) + "</div>" +
        "</div>"
      );
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    renderLogs();
    
    
    function goTorine() {
  const container = document.querySelector(".container");

  // ① 画面本体をほどけさせる
  if (container) {
    container.classList.add("fade-out");
  }

  // ② 白い膜をその場で作る
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.inset = "0";
  overlay.style.background = "#f7f5f0";
  overlay.style.opacity = "0";
  overlay.style.pointerEvents = "none";
  overlay.style.zIndex = "99999";
  overlay.style.transition = "opacity 1s ease";

  document.body.appendChild(overlay);

  // ③ 一拍おいてから白くする
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      overlay.style.opacity = "1";
    });
  });

  // ④ 少し待ってから潜る
  setTimeout(() => {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: "smooth"
    });
  }, 450);

  // ⑤ 遷移
  setTimeout(() => {
    location.href = "torine.html";
  }, 1500);
}
    
    window.addEventListener("DOMContentLoaded", () => {
  const el = document.querySelector(".container");
  if (el) {
    setTimeout(() => {
      el.classList.add("show");
    }, 50);
  }
});
    
    function scrollToTop() {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
