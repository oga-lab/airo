/* 金の枠 */
.torine-box::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 8% 50%, rgba(255,255,255,0.95) 0 1.1px, transparent 2.4px),
    radial-gradient(circle at 22% 0%, rgba(255,245,210,0.9) 0 1px, transparent 2.2px),
    radial-gradient(circle at 46% 100%, rgba(255,255,255,0.92) 0 1.1px, transparent 2.3px),
    radial-gradient(circle at 78% 0%, rgba(255,235,170,0.88) 0 1px, transparent 2.2px),
    radial-gradient(circle at 100% 32%, rgba(255,255,255,0.95) 0 1.1px, transparent 2.4px),
    linear-gradient(
      120deg,
      rgba(212, 168, 58, 0.18) 0%,
      rgba(255, 244, 200, 0.95) 10%,
      rgba(255, 228, 120, 0.95) 22%,
      rgba(214, 170, 56, 1) 48%,
      rgba(255, 220, 110, 0.96) 72%,
      rgba(255, 250, 230, 0.92) 86%,
      rgba(212, 168, 58, 0.18) 100%
    );
  background-size:
    100% 100%,
    100% 100%,
    100% 100%,
    100% 100%,
    100% 100%,
    220% 220%;
  background-repeat: no-repeat;
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  filter:
    drop-shadow(0 0 4px rgba(255, 190, 70, 0.35))
    drop-shadow(0 0 10px rgba(255, 230, 150, 0.18));
  pointer-events: none;
  z-index: 2;
}

/* キラキラ */
.torine-box::after {
  content: "";
  position: absolute;
  inset: -22px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 3;
  background:
    radial-gradient(circle at -10% 14%, rgba(255,239,170,0.85) 0 0.8px, transparent 1.6px),
    radial-gradient(circle at 18% 10%, rgba(255,244,190,0.78) 0 0.8px, transparent 1.7px),
    radial-gradient(circle at 42% 12%, rgba(255,239,170,0.82) 0 0.8px, transparent 1.6px),
    radial-gradient(circle at 78% 11%, rgba(255,239,170,0.82) 0 0.8px, transparent 1.6px),
    radial-gradient(circle at 110% 16%, rgba(226,185,72,0.8) 0 0.9px, transparent 1.8px),
    radial-gradient(circle at -9% 92%, rgba(226,185,72,0.82) 0 1px, transparent 2px),
    radial-gradient(circle at 34% 90%, rgba(212,168,58,0.78) 0 0.9px, transparent 1.8px),
    radial-gradient(circle at 54% 88%, rgba(255,244,190,0.78) 0 0.9px, transparent 1.8px),
    radial-gradient(circle at 78% 87%, rgba(212,168,58,0.78) 0 0.9px, transparent 1.8px),
    radial-gradient(circle at 109% 84%, rgba(226,185,72,0.8) 0 0.9px, transparent 1.8px),
    radial-gradient(circle at 72% 40%, rgba(255,244,190,0.9) 0 1.6px, transparent 3px),
    radial-gradient(circle at -4% 78%, rgba(226,185,72,0.88) 0 1.8px, transparent 3.2px),
    radial-gradient(circle at 12% 28%, rgba(255,239,170,0.55) 0 0.7px, transparent 1.4px),
    radial-gradient(circle at 52% 72%, rgba(255,244,190,0.5) 0 0.8px, transparent 1.5px),
    radial-gradient(circle at 80% 66%, rgba(226,185,72,0.48) 0 0.7px, transparent 1.4px);
  background-repeat: no-repeat;
  filter: brightness(1.05);
  animation: sparkle 2.6s ease-in-out infinite alternate;

}

<script>

let selectedId = null;
let editingId = null;
let selectedTags = [];
let currentPhoto = "";
let logs = JSON.parse(localStorage.getItem("airoLogs")) || [];

/* ---------- 共通 ---------- */
function saveToStorage() {
localStorage.setItem("airoLogs", JSON.stringify(logs));
}

function escapeHtml(text) {
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getTagClass(tag) {
  switch (tag) {
    case "美術": return "tag-art";
    case "書道": return "tag-calligraphy";
    case "写真": return "tag-photo";
    case "舞台": return "tag-stage";
    case "音楽": return "tag-music";
    case "映画": return "tag-movie";
    case "本": return "tag-book";
    case "建築": return "tag-architecture";
    case "工芸": return "tag-craft";  
　case "人": return "tag-person";
　case "日常": return "tag-daily";
    default: return "tag-other";
  }
}

function renderTagSpans(tags) {
  const list = tags || [];
  return list.map(tag =>
    "<span class='tag " + getTagClass(tag) + "'>" + escapeHtml(tag) + "</span>"
  ).join(" ");
}

/* ---------- 画像 ---------- */
function updatePhotoPreview(src) {
  const wrap = document.getElementById("photoPreviewWrap");
  const img = document.getElementById("photoPreview");

  if (!wrap || !img) return;

  if (src) {
    img.src = src;
    wrap.classList.remove("hidden");
  } else {
    img.src = "";
    wrap.classList.add("hidden");
  }
}

/* ---------- タグ ---------- */
function bindTagButtons() {
  const tagButtons = document.querySelectorAll(".tag-btn");

  tagButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      const tag = btn.dataset.tag;

      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
        btn.classList.remove("active");
      } else {
        selectedTags.push(tag);
        btn.classList.add("active");
      }
    });
  });
}


function addPoint(value = "") {
  const container = document.getElementById("points");

  const wrapper = document.createElement("div");
  wrapper.className = "point-item";

  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "例：赤だけ浮いてた";
  input.value = value;

  const removeBtn = document.createElement("span");
  removeBtn.textContent = "×";
  removeBtn.className = "remove-btn";

  removeBtn.onclick = () => {
    wrapper.remove();
  };

  wrapper.appendChild(input);
  wrapper.appendChild(removeBtn);

  container.appendChild(wrapper);
}


/* ---------- とりね ---------- */
function revealTorine() {
  const torineSection = document.getElementById("torineSection");
  if (!torineSection) return;

  torineSection.classList.remove("hidden");
  setTimeout(() => {
  torineSection.classList.add("show");
}, 100);

  setTimeout(() => {
    torineSection.classList.add("show");
  }, 80);

  const torineInput = document.getElementById("torine");
  if (torineInput) {
    setTimeout(() => {
      torineInput.focus();
    }, 220);
  }
}

/* ---------- フォーム ---------- */
function clearForm() {
  const dateEl = document.getElementById("date");
  const exhibitionEl = document.getElementById("exhibition");
  const placeEl = document.getElementById("place");
  const feltEl = document.getElementById("felt");
  const analysisEl = document.getElementById("analysis");
  const torineEl = document.getElementById("torine");
  const photoEl = document.getElementById("photo");
  const helpText = document.getElementById("helpText");
  const torineSection = document.getElementById("torineSection");
  const fileName = document.getElementById("file-name");
  const pointsContainer = document.getElementById("points");
  const atmosphereEl = document.getElementById("atmosphere");
if (atmosphereEl) atmosphereEl.value = "";


  if (dateEl) dateEl.value = "";
  if (exhibitionEl) exhibitionEl.value = "";
  if (placeEl) placeEl.value = "";
  if (feltEl) feltEl.value = "";
  if (analysisEl) analysisEl.value = "";
  if (torineEl) torineEl.value = "";
  if (photoEl) photoEl.value = "";
  if (pointsContainer) pointsContainer.innerHTML = "";

  currentPhoto = "";
  updatePhotoPreview("");

  if (fileName) fileName.textContent = "選択されていません";

  selectedTags = [];
  document.querySelectorAll(".tag-btn").forEach(btn => btn.classList.remove("active"));

  if (helpText) helpText.classList.add("hidden");

  if (torineSection) {
    torineSection.classList.add("hidden");
    torineSection.classList.remove("show");
  }
}

function updateFormMode() {
  const saveButton = document.getElementById("saveButton");
  const cancelButton = document.getElementById("cancelButton");

  if (saveButton) {
    saveButton.textContent = editingId ? "更新" : "保存";
  }
  if (cancelButton) {
    cancelButton.classList.toggle("hidden", !editingId);
  }
}


function saveLog() {
  const date = document.getElementById("date")?.value || "";
  const exhibition = document.getElementById("exhibition")?.value || "";
  const place = document.getElementById("place")?.value || "";
  const felt = document.getElementById("felt")?.value || "";
  const analysis = document.getElementById("analysis")?.value || "";
  const torine = document.getElementById("torine")?.value.trim() || "";
  const pointInputs = document.querySelectorAll("#points input");
const points = Array.from(pointInputs).map(i => i.value);
const atmosphere = document.getElementById("atmosphere")?.value || "";


  if (editingId) {
    const target = logs.find(log => log.id === editingId);
    if (target) {
      target.date = date;
      target.exhibition = exhibition;
      target.place = place;
target.points = points;
target.atmosphere = atmosphere;
      target.tags = selectedTags;
target.tag = selectedTags[0] || "";
      target.photo = currentPhoto;
      target.felt = felt;
      target.analysis = analysis;
      target.torine = torine;
    }
    selectedId = editingId;
  } else {
    const log = {
      id: Date.now(),
      date,
      exhibition,
      place,
      points,
      tags: selectedTags,
tag: selectedTags[0] || "",
      photo: currentPhoto,
      atmosphere,
      felt,
      analysis,
      torine
    };
    logs.unshift(log);
    selectedId = log.id;
  }

  

  setTimeout(() => {
    saveToStorage();
    clearForm();
    editingId = null;
    updateFormMode();
    renderLogs();

    if (selectedId) {
  playSaveEffect();

  setTimeout(() => {
    showDetail(selectedId);
  }, 1200);
}
  }, 300);
}


function cancelEdit() {
  editingId = null;
  clearForm();
  updateFormMode();
}

/* ---------- 並び替え・絞り込み ---------- */
function getFilteredSortedLogs() {
  const sortOrder = document.getElementById("sortOrder")?.value || "new";
  const filterTag = document.getElementById("filterTag")?.value || "";

  let result = [...logs];

  if (filterTag) {
 result = result.filter(log => {
  const tags = log.tags || (log.tag ? [log.tag] : []);
  return tags.includes(filterTag);
});
  }

  result.sort((a, b) => {
    return sortOrder === "new" ? b.id - a.id : a.id - b.id;
  });

  return result;
}

/* ---------- ログ一覧 ---------- */
function renderLogs() {
  const logList = document.getElementById("logList");
  if (!logList) return;

  const filteredLogs = getFilteredSortedLogs().slice(0, 3);
  logList.innerHTML = "";

  if (filteredLogs.length === 0) {
    logList.innerHTML = "<p style='color:rgba(255,255,255,0.6);'>まだ記録がありません。</p>";
    return;
  }

  filteredLogs.forEach(log => {
    const div = document.createElement("div");
    div.className = "log-item";
    div.onclick = function () {
      showDetail(log.id);
    };

    const torineMain = document.createElement("div");
    torineMain.className = "log-torine-main";

    if (!log.torine || log.torine.trim() === "") {
      torineMain.textContent = "とりね中…";
      torineMain.classList.add("empty");
    } else {
      torineMain.textContent = log.torine;
    }

    const subtitle = document.createElement("div");
    subtitle.className = "log-subtitle";
    subtitle.innerHTML =
  [
    escapeHtml(log.date || ""),
    escapeHtml(log.exhibition || ""),
    escapeHtml(log.place || log.artist || ""),
   renderTagSpans(log.tags || (log.tag ? [log.tag] : []))
  ].filter(Boolean).join("<br>");

    div.appendChild(torineMain);
    div.appendChild(subtitle);
    logList.appendChild(div);
  });
}

/* ---------- ふりかえり ---------- */
function makeDetailBlock(label, value) {
  return (
    "<div class='detail-block'>" +
      "<div class='detail-label'>" + escapeHtml(label) + "</div>" +
      "<div>" + escapeHtml(value) + "</div>" +
    "</div>"
  );
}

function showDetail(id) {
  const log = logs.find(item => item.id === id);
  if (!log) return;

  selectedId = id;

  const detailCard = document.getElementById("detailCard");
  const detailView = document.getElementById("detailView");

  detailView.innerHTML =
    "<div class='tag-wrap'>" + renderTagSpans(log.tags || (log.tag ? [log.tag] : [])) + "</div>" +
    ((log.torine && log.torine.trim() !== "")
      ? "<div class='torine-hero'>" +
          "<div class='torine-hero-label'>とりね</div>" +
          "<div class='torine-hero-text'>" + escapeHtml(log.torine) + "</div>" +
        "</div>"
      : "<div class='torine-hero'>" +
          "<div class='torine-hero-label'>とりね</div>" +
          "<div class='torine-hero-text'>とりね中…</div>" +
        "</div>"
    ) +
    (log.photo
  ? "<div class='detail-block'>" +
      "<div class='detail-label'>画像</div>" +
      "<img src='" + log.photo + "' class='photo-preview'>" +
    "</div>"
  : "") +
    makeDetailBlock("日付", log.date || "") +
makeDetailBlock("展覧会名", log.exhibition || "") +
makeDetailBlock("場所", log.place || log.artist || "") +
makeDetailBlock("雰囲気", log.atmosphere || log.air || "") +
makeDetailBlock("感じたこと", log.felt || "") +
makeDetailBlock(
  "印象に残ったところ",
  log.points && log.points.length ? log.points.join("\n") : ""
) +
makeDetailBlock("しくみ", log.analysis || "");

  detailCard.classList.remove("hidden");

  window.scrollTo({
    top: detailCard.offsetTop - 20,
    behavior: "smooth"
  });
}



function startEdit() {
  const log = logs.find(item => item.id === selectedId);
  if (!log) return;

  editingId = log.id;

  document.getElementById("date").value = log.date || "";
  document.getElementById("exhibition").value = log.exhibition || "";
  document.getElementById("place").value = log.place || "";
  document.getElementById("atmosphere").value = log.atmosphere || "";
  document.getElementById("felt").value = log.felt || "";
  document.getElementById("analysis").value = log.analysis || "";
  document.getElementById("torine").value = log.torine || "";
  
  const pointsContainer = document.getElementById("points");
pointsContainer.innerHTML = "";

if (log.points && log.points.length) {
  log.points.forEach(p => addPoint(p));
} else {
  addPoint();
}

  currentPhoto = log.photo || "";
  updatePhotoPreview(currentPhoto);

  selectedTags = log.tags || (log.tag ? [log.tag] : []);

document.querySelectorAll(".tag-btn").forEach(btn => {
  btn.classList.toggle("active", selectedTags.includes(btn.dataset.tag));
});

  const torineSection = document.getElementById("torineSection");
  if (torineSection) {
    torineSection.classList.remove("hidden");
    setTimeout(() => {
      torineSection.classList.add("show");
    }, 80);
  }
  
 

  updateFormMode();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}



function deleteLog() {
  if (!selectedId) return;

  const ok = confirm("この記録を削除する？");
  if (!ok) return;

  logs = logs.filter(log => log.id !== selectedId);
  saveToStorage();

  selectedId = null;
  editingId = null;
  clearForm();
  updateFormMode();

  const detailCard = document.getElementById("detailCard");
  if (detailCard) {
    detailCard.classList.add("hidden");
  }

  renderLogs();
}

/* ---------- ヘルプ ---------- */
function toggleHelp() {
  const el = document.getElementById("helpText");
  if (el) {
    el.classList.toggle("hidden");
  }
}

const openingMessages = [

  "どんな空気だった？",

if (container) {

function playSaveEffect() {
  for (let i = 0; i < 36; i++) {
  const p = document.createElement("div");
  p.className = "save-particle";

  // ① 濃淡
  p.style.opacity = 0.2 + Math.random() * 0.6;

  // ② サイズ
  let size;

if (i < 2) {
  // 1〜2個だけ大きめ
  size = 7 + Math.random() * 3;
} else {
  size = 2 + Math.random() * 4;
}

p.style.width = `${size}px`;
p.style.height = `${size}px`;

  // ③ 速さ
  p.style.animationDuration = `${0.8 + Math.random() * 0.8}s`;

  // 位置
  p.style.left = `${Math.random() * window.innerWidth}px`;
  p.style.top = `${Math.random() * window.innerHeight}px`;

  // 動き
  let moveX;
let moveY;

if (Math.random() < 0.35) {
  // 横に流れる粒子
  moveX = Math.random() * 360 - 180;
  moveY = Math.random() * 80 - 40;
} else {
  // ふわっと上に舞う粒子
  moveX = Math.random() * 220 - 110;
  moveY = -60 - Math.random() * 160;
}

p.style.setProperty("--x", `${moveX}px`);
p.style.setProperty("--y", `${moveY}px`);
  
  
  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
  }, 1200);
}
}


function exportAiroData() {
  const data = {
    version: "airo-backup-1",
    exportedAt: new Date().toISOString(),
    airoLogs: JSON.parse(localStorage.getItem("airoLogs") || "[]"),
    airoWorks: JSON.parse(localStorage.getItem("airoWorks") || "[]")
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "airo-backup.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportAiroData(type = "all") {
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10); // 2026-05-01

  let data = {};
  let filename = "";

  if (type === "logs") {
    data = {
      airoLogs: JSON.parse(localStorage.getItem("airoLogs") || "[]")
    };
    filename = `airo-logs-${dateStr}.json`;

  } else if (type === "works") {
    data = {
      airoWorks: JSON.parse(localStorage.getItem("airoWorks") || "[]")
    };
    filename = `airo-works-${dateStr}.json`;

  } else {
    data = {
      airoLogs: JSON.parse(localStorage.getItem("airoLogs") || "[]"),
      airoWorks: JSON.parse(localStorage.getItem("airoWorks") || "[]")
    };
    filename = `airo-all-${dateStr}.json`;
  }

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

function importAiroData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      if (Array.isArray(data.airoLogs)) {
        localStorage.setItem("airoLogs", JSON.stringify(data.airoLogs));
      }

      if (Array.isArray(data.airoWorks)) {
        localStorage.setItem("airoWorks", JSON.stringify(data.airoWorks));
      }

      logs = JSON.parse(localStorage.getItem("airoLogs") || "[]");
      renderLogs();
      showToast("バックアップを読み込みました");

    } catch (err) {
      showToast("読み込みに失敗しました");
    }
  };

  reader.readAsText(file);
}
