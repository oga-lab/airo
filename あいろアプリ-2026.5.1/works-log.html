<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>制作ログ｜あいろ</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(180deg, #5f6064 0%, #3f4044 100%);
      background-attachment: fixed;
      color: #f8f8f8;
      padding: 20px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(10px);
    }

    .container.show {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    h1, h2 {
      margin-top: 0;
    }

    h1 {
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 46px;
      margin-top: 0;
      margin-bottom: 0;
      line-height: 1.1;
      color: #fff6cc;
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 250, 252, 0.78);
      font-size: 12px;
      letter-spacing: 0.12em;
      margin-top: 4px;
      margin-bottom: 20px;
      opacity: 0.95;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 4px;
    }

    .logo-img {
      width: 220px;
      max-width: 80%;
      height: auto;
      display: block;
      margin: 0 auto;
      filter:
        drop-shadow(0 2px 6px rgba(0,0,0,0.28))
        drop-shadow(0 0 8px rgba(255,245,200,0.12));
    }

    .card {
      background: rgba(28, 28, 31, 0.58);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 22px;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.16),
        0 2px 8px rgba(255, 255, 255, 0.03) inset;
      backdrop-filter: blur(4px);
      margin-top: 24px;
    }

    .section-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
      color: #fffafc;
    }

    .subnav-row-left {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .subnav-link {
      width: auto;
      margin: 0;
      padding: 4px 2px;
      background: transparent;
      border: none;
      box-shadow: none;
      color: rgba(255,255,255,0.72);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-align: left;
    }

    .subnav-link:hover {
      color: rgba(255,255,255,0.92);
    }

    .top-tools {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .top-tools select {
      margin-bottom: 0;
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font-size: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .hidden {
      display: none;
    }

    /* ログ一覧アイテム */
    .work-item {
      background: rgba(255,255,255,0.08);
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease;
    }

    .work-item:hover {
      background: rgba(255,255,255,0.12);
    }

    .work-item:active {
      transform: scale(0.995);
    }

    .work-title-main {
      font-size: 18px;
      font-weight: 700;
      color: #fffafc;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .work-title-main.empty {
      color: rgba(255,255,255,0.35);
      opacity: 0.45;
      filter: blur(0.6px);
    }

    .work-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.62);
      line-height: 1.5;
    }

    /* 詳細 */
    .detail {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: 15px;
    }

    .detail-block {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .detail-label {
      font-size: 13px;
      color: #dbc06a;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }

    .photo-preview {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 16px;
      margin-top: 4px;
      margin-bottom: 0;
      display: block;
    }

    .torine-hero {
      margin-bottom: 18px;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.04);
    }

    .torine-hero-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #dbc06a;
      margin-bottom: 8px;
    }

    .torine-hero-text {
      font-size: 26px;
      line-height: 1.6;
      font-weight: 700;
      color: #fffafc;
      white-space: pre-wrap;
    }

    /* ボタン */
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .detail-actions {
      margin-top: 16px;
      gap: 14px;
      display: flex;
      flex-direction: row;
      justify-content: center;
    }

    .detail-actions button,
    .detail-close {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 600;
      border-radius: 999px;
      border: none;
      box-shadow: none;
      outline: none;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .detail-actions button:first-child {
      background: #dbc06a;
      color: #1b1b1d;
    }

    .detail-actions .secondary {
      background: rgba(255,255,255,0.10);
      color: #ffffff;
    }

    .detail-close {
      display: block;
      width: auto;
      margin: 16px auto 0;
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      font-size: 14px;
      opacity: 0.9;
    }

    .detail-actions button:active,
    .detail-close:active {
      transform: none;
      opacity: 0.75;
    }

    /* 空メッセージ */
    .empty-message {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.62);
      padding: 12px 2px 4px 2px;
    }

    /* サイドナビ */
    .side-nav {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
    }

    .side-nav a {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      padding: 6px 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
    }

    .side-nav a:active {
      opacity: 0.6;
      transform: scale(0.95);
    }

    .side-nav a.active {
      color: #dbc06a;
      opacity: 1;
    }

    /* スクロールトップボタン */
    .scroll-top-btn {
      position: fixed;
      right: 18px;
      bottom: 24px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 245, 200, 0.14);
      color: rgba(255, 245, 200, 0.9);
      border: 1px solid rgba(255, 245, 200, 0.22);
      backdrop-filter: blur(6px);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      opacity: 0.7;
      z-index: 999;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      cursor: pointer;
    }

    .scroll-top-btn:active {
      transform: scale(0.92);
      opacity: 0.75;
    }

    /* フェード */
    .fade-out {
      opacity: 0;
      filter: blur(4px);
      transition: 0.8s ease;
    }

    .page-fade-out {
      position: fixed;
      inset: 0;
      background: rgba(20,20,22,0.6);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .page-fade-out.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="pageFadeOut" class="page-fade-out"></div>

<div class="container">
  <div class="logo-wrap">
    <img src="logo-log.png" class="logo-img" alt="あいろ">
  </div>

  <div class="card">
    <div class="subnav-row-left">
      <button type="button" class="subnav-link" onclick="location.href='works.html'">
        制作ページにもどる
      </button>
    </div>

    <div class="top-tools">
      <select id="sortOrder" onchange="renderWorks()">
        <option value="new">新しい順</option>
        <option value="old">古い順</option>
      </select>
    </div>

    <div id="emptyMessage" class="empty-message hidden">
      まだ作品ログがないよ
    </div>

    <div id="workList"></div>
  </div>

  <div class="card hidden" id="detailCard">
    <h2 class="section-title">作品ログ</h2>
    <div id="detailView" class="detail"></div>

    <div class="button-row detail-actions">
      <button onclick="startEditFromLog()">編集</button>
      <button type="button" class="secondary" onclick="deleteWork()">削除</button>
    </div>

    <button type="button" class="secondary detail-close" onclick="closeDetail()">
      閉じる
    </button>
  </div>
</div>

<div class="side-nav">
  <a href="index.html">あいろ</a>
  <a href="logs.html">ログ一覧</a>
  <a href="insight.html">いんさいと</a>
  <a href="torine.html">とりね洞</a>
  <a href="works.html" class="active">制作</a>
</div>

<button class="scroll-top-btn" onclick="scrollToTop()">︿</button>

<script>
  let works = JSON.parse(localStorage.getItem("airoWorks")) || [];
  let selectedId = null;

  function escapeHtml(text) {
    return String(text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function makeDetailBlock(label, value) {
    if (!value || value.trim() === "") return "";
    return (
      "<div class='detail-block'>" +
        "<div class='detail-label'>" + escapeHtml(label) + "</div>" +
        "<div>" + escapeHtml(value) + "</div>" +
      "</div>"
    );
  }

  function getSortedWorks() {
    const sortOrder = document.getElementById("sortOrder").value;
    const result = [...works];
    result.sort((a, b) => sortOrder === "new" ? b.id - a.id : a.id - b.id);
    return result;
  }

  function renderWorks() {
    const workList = document.getElementById("workList");
    const emptyMessage = document.getElementById("emptyMessage");
    const sorted = getSortedWorks();

    workList.innerHTML = "";

    if (sorted.length === 0) {
      emptyMessage.classList.remove("hidden");
      return;
    } else {
      emptyMessage.classList.add("hidden");
    }

    sorted.forEach(work => {
      const div = document.createElement("div");
      div.className = "work-item";
      div.onclick = function () {
        showDetail(work.id);
      };

      const titleMain = document.createElement("div");
      titleMain.className = "work-title-main";
      if (!work.title || work.title.trim() === "") {
        titleMain.textContent = "無題";
        titleMain.classList.add("empty");
      } else {
        titleMain.textContent = work.title;
      }

      const subtitle = document.createElement("div");
      subtitle.className = "work-subtitle";
      subtitle.innerHTML = [
        escapeHtml(work.date || ""),
        escapeHtml(work.theme || "")
      ].filter(Boolean).join("<br>");

      div.appendChild(titleMain);
      div.appendChild(subtitle);
      workList.appendChild(div);
    });
  }

  function showDetail(id) {
    const work = works.find(item => item.id === id);
    if (!work) return;

    selectedId = id;

    const detailCard = document.getElementById("detailCard");
    const detailView = document.getElementById("detailView");

    detailView.innerHTML =
      (work.photo
        ? "<div class='detail-block'><div class='detail-label'>画像</div><img src='" + work.photo + "' class='photo-preview' alt='作品画像'></div>"
        : "") +
      makeDetailBlock("日付", work.date || "") +
      makeDetailBlock("作品名", work.title || "") +
      makeDetailBlock("テーマ", work.theme || "") +
      makeDetailBlock("きっかけ", work.trigger || "") +
      makeDetailBlock("挑戦", work.challenge || "") +
      makeDetailBlock("届けたい感じ", work.feeling || "");

    detailCard.classList.remove("hidden");
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  }

  function closeDetail() {
    document.getElementById("detailCard").classList.add("hidden");
  }

  function deleteWork() {
    if (!selectedId) return;
    const ok = confirm("この作品ログを削除する？");
    if (!ok) return;

    works = works.filter(work => work.id !== selectedId);
    localStorage.setItem("airoWorks", JSON.stringify(works));

    selectedId = null;
    closeDetail();
    renderWorks();
  }

  function startEditFromLog() {
    if (!selectedId) return;
    localStorage.setItem("airoEditingWorkId", String(selectedId));
    location.href = "works.html";
  }

  function openWorkFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const targetId = params.get("id");
    if (!targetId) return;

    const numericId = Number(targetId);
    if (!numericId) return;

    const target = works.find(work => work.id === numericId);
    if (!target) return;

    showDetail(numericId);

    setTimeout(() => {
      const detailCard = document.getElementById("detailCard");
      if (detailCard) {
        detailCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }, 100);
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  renderWorks();
  openWorkFromQuery();

  window.addEventListener("DOMContentLoaded", () => {
    const el = document.querySelector(".container");
    if (el) {
      setTimeout(() => {
        el.classList.add("show");
      }, 50);
    }
  });
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const reg = await navigator.serviceWorker.register("./sw.js");
        console.log("SW registered:", reg.scope);
      } catch (err) {
        console.error("SW registration failed:", err);
      }
    });
  }
</script>

</body>
</html>
